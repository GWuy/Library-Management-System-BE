spring.application.name=lms-be

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/lms
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh-expiration=86400000

# EMAIL (SMTP Gmail)
spring.mail.host=${SMTP_HOST}
spring.mail.port=587
spring.mail.username=${SMTP_MAIL_USERNAME}
spring.mail.password=${SMTP_MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# R2 Credential
cloudflare.r2.access-key-id=${R2_ACCESS_KEY}
cloudflare.r2.secret-key-id=${R2_SECRET_KEY}
cloudflare.r2.account-id=${R2_ACCOUNT_ID}
cloudflare.r2.end-point=${R2_END_POINT}
cloudflare.r2.bucket-name=${R2_BUCKET_NAME}
cloudflare.r2.public-base-url=${R2_PUBLIC_BASE_URL}