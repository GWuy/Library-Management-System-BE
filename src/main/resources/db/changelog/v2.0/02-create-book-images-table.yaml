databaseChangeLog:
  - changeSet:
      id: 20260714-2.0-2
      author: g_wuy
      changes:
        - createTable:
            tableName: book_images
            columns:
              - column:
                  name: id
                  type: integer
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: book_id
                  type: integer
                  constraints:
                    nullable: false
                    foreignKeyName: fk_book_images_book
                    referencedTableName: books
                    referencedColumnNames: id
              - column:
                  name: image_url
                  type: varchar(500)
                  constraints:
                    nullable: false
              - column:
                  name: is_primary
                  type: boolean
                  defaultValueBoolean: false
              - column:
                  name: created_at
                  type: timestamp
                  defaultValueComputed: CURRENT_TIMESTAMP
